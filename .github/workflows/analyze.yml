name: Analizar partidos y alertar

on:
  push:
    branches: [main]
  schedule:
    # 1 vez por hora — el script它 mismo espera 10 min y repite 5 veces
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install chromium --with-deps

      - name: Ejecutar análisis (Flashscore)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node run_flashscore.js

      - name: Subir screenshot de depuración
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore
