name: Analizar partidos y alertar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar análisis (365scores)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISABLE_XG: true
        run: node run_flashscore.js

      - name: Commit y push de cambios (aprendizaje persistente)
        run: |
          git config user.name "sofastats-bot"
          git config user.email "sofastats-bot@users.noreply.github.com"
          git add predictions.json weights.json teams.json last-local-run.json alertas.json telegram-offset.txt
          if git diff --cached --quiet; then
            echo "Sin cambios nuevos"
          else
            git commit -m "auto: aprendizaje ronda ${{ github.run_id }}"
            git push
          fi
        shell: bash
