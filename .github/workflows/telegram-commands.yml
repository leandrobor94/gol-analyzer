name: Comandos Telegram

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Revisar comandos Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node telegram-cmd.js
